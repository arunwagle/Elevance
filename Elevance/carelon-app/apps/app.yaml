command:
  - gunicorn
  - app:app
  - --config
  - gunicorn.conf.py
  - -w
  - '4'
  - --timeout
  - '120'
  - --max-requests
  - '1000'
  - --max-requests-jitter
  - '50'
env:
  - name: 'VOLUME_PATH'
    value: '/Volumes/aw_serverless_stable_catalog/carelon/dxutility'
  - name: 'PROTEGRITY_API_BASE_URL'
    value: 'http://localhost:5001/api/v1'
  - name: 'FLASK_ENV'
    value: 'production'
  - name: 'MAX_UPLOAD_SIZE_MB'
    value: '2048'
  - name: 'SESSION_TIMEOUT_SECONDS'
    value: '60'
  - name: 'PREVIEW_DEFAULT_ROWS'
    value: '50'
  - name: 'DATABRICKS_SQL_WAREHOUSE_ID'
    value: '2d8e531640ffa469'
  - name: 'ADMIN_USERS'
    value: 'arun.wagle@databricks.com'
  - name: 'SECRET_KEY'
    valueFrom: 'secret/carelon-app/flask-secret-key'
  - name: 'PROTEGRITY_API_KEY'
    valueFrom: 'secret/carelon-app/api-key'
