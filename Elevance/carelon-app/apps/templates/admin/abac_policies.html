{% extends "layout.html" %}
{% block title %}Setup ABAC Policies{% endblock %}
{% block content %}
<div class="page-header">
    <h2>Setup ABAC Policies</h2>
    <a href="{{ url_for('admin.admin_dashboard') }}" class="btn-back">← Back to Admin</a>
</div>

<form id="create-abac-form" class="admin-form">
    <div class="form-group">
        <label for="policy-name">Policy Name <span class="required">*</span></label>
        <input type="text" id="policy-name" name="policy_name" required
               placeholder="e.g., pii_column_mask_policy">
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="catalog-name">Catalog <span class="required">*</span></label>
            <input type="text" id="catalog-name" name="catalog" required
                   value="aw_serverless_stable_catalog">
        </div>
        <div class="form-group">
            <label for="schema-name">Schema <span class="required">*</span></label>
            <input type="text" id="schema-name" name="schema" required value="carelon">
        </div>
    </div>

    <div class="form-group">
        <label for="table-name">Table Name <span class="required">*</span></label>
        <input type="text" id="table-name" name="table_name" required
               placeholder="e.g., patient_records">
    </div>

    <div class="form-group">
        <label for="policy-type">Policy Type <span class="required">*</span></label>
        <select id="policy-type" name="policy_type">
            <option value="row_filter">Row Filter</option>
            <option value="column_mask">Column Mask</option>
        </select>
    </div>

    <div class="form-group" id="row-filter-section">
        <label for="filter-expression">Filter Expression</label>
        <textarea id="filter-expression" name="filter_expression" rows="3"
                  placeholder="e.g., region = current_user_attribute(&#39;region&#39;)"></textarea>
        <small class="form-hint">SQL boolean expression for row-level filtering</small>
    </div>

    <div class="form-group" id="column-mask-section">
        <label for="column-name">Column to Mask</label>
        <input type="text" id="column-name" name="column_name"
               placeholder="e.g., ssn, email, phone">
    </div>

    <div class="form-group" id="mask-function-section">
        <label for="mask-function">Mask Function</label>
        <select id="mask-function" name="mask_function">
            <option value="CASE WHEN is_account_group_member(&#39;admin&#39;) THEN {col} ELSE &#39;***MASKED***&#39; END">
                Admin-only (mask for non-admins)
            </option>
            <option value="CASE WHEN is_account_group_member(&#39;data_steward&#39;) THEN {col} ELSE &#39;***MASKED***&#39; END">
                Data Steward only
            </option>
            <option value="regexp_replace({col}, &#39;.&#39;, &#39;*&#39;)">
                Full mask (all characters)
            </option>
            <option value="concat(&#39;***&#39;, right({col}, 4))">
                Last 4 characters only
            </option>
            <option value="custom">Custom expression...</option>
        </select>
    </div>

    <div class="form-group hidden" id="custom-mask-section">
        <label for="custom-mask-expr">Custom Mask Expression</label>
        <textarea id="custom-mask-expr" name="custom_mask_expression" rows="3"
                  placeholder="SQL expression using {col} as placeholder for the column name"></textarea>
    </div>

    <div class="form-group">
        <label for="applied-to-groups">Apply to Groups</label>
        <input type="text" id="applied-to-groups" name="groups"
               placeholder="Comma-separated group names (leave blank for all users)">
    </div>

    <div class="form-actions">
        <button type="submit" class="btn-primary">Create Policy</button>
        <button type="button" class="btn-secondary" id="preview-sql">Preview SQL</button>
        <button type="reset" class="btn-secondary">Reset</button>
    </div>
</form>

<div id="sql-preview" class="result-panel hidden">
    <h3>Generated SQL</h3>
    <pre id="sql-preview-content"></pre>
</div>

<div id="abac-result" class="result-panel hidden">
    <h3>Result</h3>
    <pre id="abac-result-content"></pre>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/admin.js') }}"></script>
{% endblock %}
