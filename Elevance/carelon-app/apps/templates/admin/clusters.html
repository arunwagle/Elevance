{% extends "layout.html" %}
{% block title %}Create Job Clusters{% endblock %}
{% block content %}
<div class="page-header">
    <h2>Create Job Clusters</h2>
    <a href="{{ url_for('admin.admin_dashboard') }}" class="btn-back">← Back to Admin</a>
</div>

<form id="create-cluster-form" class="admin-form">
    <div class="form-group">
        <label for="cluster-name">Cluster Name <span class="required">*</span></label>
        <input type="text" id="cluster-name" name="cluster_name" required
               placeholder="e.g., tokenization-job-cluster">
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="spark-version">Spark Version <span class="required">*</span></label>
            <select id="spark-version" name="spark_version">
                <option value="15.4.x-scala2.12">15.4 LTS (Scala 2.12)</option>
                <option value="14.3.x-scala2.12">14.3 LTS (Scala 2.12)</option>
                <option value="13.3.x-scala2.12">13.3 LTS (Scala 2.12)</option>
            </select>
        </div>
        <div class="form-group">
            <label for="node-type">Node Type <span class="required">*</span></label>
            <select id="node-type" name="node_type_id">
                <option value="i3.xlarge">i3.xlarge (4 cores, 30.5 GB)</option>
                <option value="i3.2xlarge">i3.2xlarge (8 cores, 61 GB)</option>
                <option value="m5d.large">m5d.large (2 cores, 8 GB)</option>
                <option value="m5d.xlarge">m5d.xlarge (4 cores, 16 GB)</option>
                <option value="m5d.2xlarge">m5d.2xlarge (8 cores, 32 GB)</option>
                <option value="r5d.large">r5d.large (2 cores, 16 GB, memory-opt)</option>
            </select>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="num-workers">Number of Workers <span class="required">*</span></label>
            <input type="number" id="num-workers" name="num_workers" value="2" min="0" max="100">
        </div>
        <div class="form-group">
            <label for="driver-node-type">Driver Node Type</label>
            <select id="driver-node-type" name="driver_node_type_id">
                <option value="">(Same as worker)</option>
                <option value="i3.xlarge">i3.xlarge (4 cores, 30.5 GB)</option>
                <option value="i3.2xlarge">i3.2xlarge (8 cores, 61 GB)</option>
                <option value="m5d.xlarge">m5d.xlarge (4 cores, 16 GB)</option>
                <option value="m5d.2xlarge">m5d.2xlarge (8 cores, 32 GB)</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label>Autoscaling</label>
        <div class="form-check">
            <input type="checkbox" id="enable-autoscale" name="enable_autoscale">
            <label for="enable-autoscale">Enable autoscaling</label>
        </div>
    </div>

    <div class="form-row hidden" id="autoscale-section">
        <div class="form-group">
            <label for="min-workers">Min Workers</label>
            <input type="number" id="min-workers" name="min_workers" value="1" min="0">
        </div>
        <div class="form-group">
            <label for="max-workers">Max Workers</label>
            <input type="number" id="max-workers" name="max_workers" value="8" min="1">
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="auto-terminate">Auto-Terminate (minutes)</label>
            <input type="number" id="auto-terminate" name="autotermination_minutes"
                   value="30" min="10" max="1440">
        </div>
        <div class="form-group">
            <label for="spot-policy">Spot Instance Policy</label>
            <select id="spot-policy" name="spot_policy">
                <option value="COST_OPTIMIZED">Cost Optimized (spot + on-demand fallback)</option>
                <option value="RELIABILITY_OPTIMIZED">Reliability Optimized (on-demand)</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label for="cluster-tags">Tags (JSON, optional)</label>
        <textarea id="cluster-tags" name="tags" rows="3"
                  placeholder='{"team": "data-eng", "project": "carelon"}'></textarea>
    </div>

    <div class="form-group">
        <label for="spark-conf">Spark Config (optional, key=value per line)</label>
        <textarea id="spark-conf" name="spark_conf" rows="3"
                  placeholder="spark.speculation=true
spark.sql.shuffle.partitions=200"></textarea>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn-primary">Create Cluster</button>
        <button type="button" class="btn-secondary" id="preview-cluster-json">Preview JSON</button>
        <button type="reset" class="btn-secondary">Reset</button>
    </div>
</form>

<div id="cluster-json-preview" class="result-panel hidden">
    <h3>Request Payload</h3>
    <pre id="cluster-json-content"></pre>
</div>

<div id="cluster-result" class="result-panel hidden">
    <h3>Result</h3>
    <pre id="cluster-result-content"></pre>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/admin.js') }}"></script>
{% endblock %}
