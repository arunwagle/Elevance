{% extends "layout.html" %}
{% block title %}Manage Databricks Jobs{% endblock %}
{% block content %}
<div class="page-header">
    <h2>Manage Databricks Jobs</h2>
    <a href="{{ url_for('admin.admin_dashboard') }}" class="btn-back">← Back to Admin</a>
</div>

<!-- Action Bar -->
<div class="jobs-action-bar">
    <div class="jobs-search">
        <input type="text" id="job-search-input" placeholder="Search jobs by name..." class="search-input">
    </div>
    <a href="https://{{ config.get('DATABRICKS_HOST', '') }}/#job/create"
           target="_blank" rel="noopener" class="btn-primary btn-create-external">
            + Create Job ↗
        </a>
</div>


<!-- Jobs List (infinite scroll) -->
<div id="jobs-list-container" class="jobs-list-container">
    <div id="jobs-list" class="jobs-list">
        <!-- Job cards rendered here by JS -->
    </div>
    <div id="jobs-loading" class="loading-indicator hidden">
        <div class="spinner"></div>
        <span>Loading jobs...</span>
    </div>
    <div id="jobs-empty" class="empty-state hidden">
        <span class="empty-icon">📋</span>
        <p>No jobs found</p>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
    window.DATABRICKS_HOST = "{{ config.get('DATABRICKS_HOST', '') }}";
</script>
<script src="{{ url_for('static', filename='js/admin_jobs.js') }}"></script>
{% endblock %}
