<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carelon - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <span class="login-icon">🔐</span>
                <h1>Carelon Tokenizer</h1>
                <p class="login-subtitle">Data Protection Portal</p>
            </div>

            {% if error %}
            <div class="alert alert-danger">⚠️ {{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('auth.login_post') }}">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autofocus
                           placeholder="Enter your username">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required
                           placeholder="Enter your password">
                </div>

                <button type="submit" class="btn-primary btn-full">Log In</button>
            </form>
        </div>
    </div>
</body>
</html>
